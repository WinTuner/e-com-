<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Electro - Register</title>
    <!-- โหลด Bootstrap และ CSS ของโปรเจกต์ -->
    <link href="css/bootstrap.min.css" rel="stylesheet">
    <link href="css/style.css" rel="stylesheet">
    <!-- โหลด FontAwesome สำหรับไอคอน -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-light">
    
    <div class="container vh-100 d-flex align-items-center justify-content-center">
        <div class="card p-4 shadow-lg" style="width: 450px; border-radius: 15px;">
            <div class="text-center mb-4">
                <h2 class="text-primary fw-bold"><i class="fas fa-user-plus me-2"></i>Create Account</h2>
                <p class="text-muted small">Join Electro to start shopping!</p>
            </div>
            
            <!-- ฟอร์มลงทะเบียน -->
            <form id="registerForm">
                <div class="mb-3">
                    <label class="form-label fw-semibold">Full Name</label>
                    <div class="input-group">
                        <span class="input-group-text bg-white"><i class="fas fa-user text-muted"></i></span>
                        <input type="text" id="name" class="form-control" required placeholder="e.g. John Doe">
                    </div>
                </div>

                <div class="mb-3">
                    <label class="form-label fw-semibold">Email address</label>
                    <div class="input-group">
                        <span class="input-group-text bg-white"><i class="fas fa-envelope text-muted"></i></span>
                        <input type="email" id="email" class="form-control" required placeholder="name@example.com">
                    </div>
                </div>

                <div class="mb-3">
                    <label class="form-label fw-semibold">Password</label>
                    <div class="input-group">
                        <span class="input-group-text bg-white"><i class="fas fa-lock text-muted"></i></span>
                        <input type="password" id="password" class="form-control" required placeholder="Min. 8 chars, 1 uppercase, 1 special">
                    </div>
                    <!-- คำแนะนำรหัสผ่าน (UI/UX) -->
                    <div class="form-text small text-muted mt-1">
                        Must contain at least 8 characters, one uppercase letter, and one special character (!,@,#,etc).
                    </div>
                </div>

                <button type="submit" class="btn btn-primary w-100 rounded-pill py-2 mt-3 fw-bold">Sign Up</button>
            </form>
            
            <!-- พื้นที่แสดงข้อความ Error จากระบบ Validation -->
            <div id="message" class="mt-3 text-center fw-bold small"></div>

            <!-- ลิงก์กลับไปหน้า Login -->
            <div class="mt-4 text-center">
                <p class="mb-0 small">Already have an account? <a href="login.html" class="text-primary fw-bold text-decoration-none">Log in here</a></p>
            </div>
        </div>
    </div>

    <!-- เรียกใช้ไฟล์ JavaScript ฝั่ง Frontend ที่เราเพิ่งเขียนไป -->
    <script src="js/register.js"></script>
</body>
</html>
